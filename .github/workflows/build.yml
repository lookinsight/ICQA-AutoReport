name: Build Auto Report EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl customtkinter pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --noconsole --onefile auto_report.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Report-v1-exe
        path: dist/auto_report.exe
