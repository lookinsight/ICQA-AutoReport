name: Build Table Engine EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 💡 엑셀 분석(pandas, openpyxl)과 그림 그리기(Pillow) 도구를 모두 설치합니다.
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl Pillow customtkinter pyinstaller

    - name: Build with PyInstaller
      # 💡 table_test.py 파일을 하나의 exe로 굽습니다.
      run: pyinstaller --noconsole --onefile --name AutoReport_test AutoReport_Test.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Table-Engine-Test-exe
        path: dist/table_test.exe
