name: Build Capture Remote EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 💡 화면 캡처용 Pillow 도구를 추가로 설치하도록 지시합니다.
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow pyinstaller

    - name: Build with PyInstaller
      # 💡 capture_test.py 파일을 하나의 exe로 굽습니다.
      run: pyinstaller --noconsole --onefile capture_test.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Capture-Remote-Test-exe
        path: dist/capture_test.exe
